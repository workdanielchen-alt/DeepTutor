# ============================================
# DeepTutor Docker Compose Configuration
# ============================================
# This file provides orchestration for DeepTutor services
#
# Usage:
#   Production:  python scripts/docker_compose.py up -d
#   Development: python scripts/docker_compose.py -f docker-compose.yml -f docker-compose.dev.yml up
#   Build only:  python scripts/docker_compose.py build
#
# Prerequisites:
#   1. Runtime settings are stored in ./data/user/settings (created automatically)
#   2. Configure model providers from the web Settings page or model_catalog.json
#   3. Use scripts/docker_compose.py so port mappings are rendered from system.json
#
# Local LLM (LM Studio / Ollama / vLLM):
#   Use "host.docker.internal" instead of "localhost" in provider base_url fields.
#   Configure provider endpoints in data/user/settings/model_catalog.json or the UI.
# ============================================

services:
  # ============================================
  # All-in-One DeepTutor Service
  # ============================================
  deeptutor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - PLATFORM_URL=http://platform:8100
        - NEXT_PUBLIC_API_BASE=http://localhost:8001
        - NEXT_PUBLIC_AUTH_ENABLED=false
    container_name: deeptutor
    restart: unless-stopped
    environment:
      - PLATFORM_URL=http://platform:8100
    ports:
      - "${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}:${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}"
      - "${DEEPTUTOR_DOCKER_FRONTEND_PORT:-3782}:${DEEPTUTOR_DOCKER_FRONTEND_PORT:-3782}"

    volumes:
      # Mount local data directory for persistence (read-write)
      # This includes runtime settings under ./data/user/settings.
      - ./data/user:/app/data/user
      - ./data/memory:/app/data/memory
      - ./data/knowledge_bases:/app/data/knowledge_bases

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - deeptutor-network

  # ============================================
  # Platform — Provider API + MCP + Mastery + Reports
  # ============================================
  platform:
    build:
      context: .
      dockerfile: docker/platform/Dockerfile
    container_name: platform
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - PROVIDER_API_PORT=8100
      - DEVICE_MANAGER_URL=http://localhost:8101
      - DEVICE_MANAGER_PORT=8101
      - DEVICE_IP=${DEVICE_IP}
      - DEEPTUTOR_API_URL=http://deeptutor:8001
      - DEEPTUTOR_URL=http://deeptutor:8001
      - MASTERY_DIR=/data/mastery
      - CHROMA_PERSIST_DIR=/data/chromadb
      - INGEST_STATUS_DIR=/data/ingest_status
      - UPLOADS_DIR=/data/uploads
      - SOURCES_DIR=/data/sources
      - SESSION_CLEANUP_THRESHOLD=2000
      - CRON_INTERVAL_S=60
      - QUIZ_SYNC_INTERVAL_S=60
      - HERMES_CONTAINER=hermes_agent
    volumes:
      - ./data/mastery:/data/mastery
      - ./data/chromadb:/data/chromadb
      - ./data/ingest_status:/data/ingest_status
      - ./data/uploads:/data/uploads
      - ./data/sources:/data/sources
      # mDNS: D-Bus socket for avahi-publish-service → host avahi-daemon
      - /var/run/dbus:/var/run/dbus:ro
      # Docker socket: allow exec into hermes_agent for QR login operations
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Shared hermes_agent identity data (/opt/data/ inside hermes_agent → ./data/hermes → /data/hermes)
      - ./data/hermes:/data/hermes
    depends_on:
      deeptutor:
        condition: service_started
    networks:
      - deeptutor-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ============================================
# Networks
# ============================================
networks:
  deeptutor-network:
    driver: bridge
