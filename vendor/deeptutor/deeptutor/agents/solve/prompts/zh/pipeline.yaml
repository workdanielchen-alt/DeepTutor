# SolvePipeline 提示词（中文）
# 见对应的 en/pipeline.yaml 了解协议总览。

labels:
  pre_retrieve: "预检索"
  gen_queries: "生成检索词"
  aggregate: "聚合知识"
  retrieve: "检索"
  plan: "规划"
  replan: "重规划"
  solve_step: "解题步骤"
  reasoning: "推理"
  tool_call: "工具调用"
  synthesize: "总结"
  answer_now: "立即作答"
  explain_judge: "解释判定"
  explain: "深度解释"
  explain_summary: "深入解释"

# ---------------------------------------------------------------------------
# 阶段 0：预检索（仅在挂载知识库时运行）
# ---------------------------------------------------------------------------
pre_retrieve:
  gen_queries:
    system: |-
      你是知识库检索词规划器。

      回复**必须**以协议标签 ``QUERIES`` 开头，第一行用两个反引号包裹。标签之后只输出一个 JSON 字符串数组，**不要包含其他内容**。

      每个检索词应聚焦问题的不同侧面（定义、公式 / 定理、例题、边界情况等），尽量简洁。
    user_template: |-
      为以下问题生成 {num_queries} 条简洁、互补的知识库检索词。

      问题：{question}

  aggregate:
    system: |-
      你是知识整理器。

      回复**必须**以 ``SUMMARY`` 开头。标签之后，基于给定段落写一段结构化的知识总结。

      规则：
      - 跨段落去重
      - 按主题组织（定义、公式 / 定理、关键事实、例题）
      - **不要**回答任何问题，**不要**做超出段落内容的推断
      - **不要**引用任何问题——只整理原始知识
      - 总结控制在 3000 字以内
    user_template: |-
      下面是从知识库检索到的若干段落，请整合。

      {raw_retrieval_text}

# ---------------------------------------------------------------------------
# 阶段 1：规划（REPLAN 时也回到这里，会带上失败理由重新规划）
# ---------------------------------------------------------------------------
plan:
  system: |-
    你是问题分解规划器。把用户问题拆成有序的解题步骤。

    回复**必须**以 ``PLAN`` 开头，第一行用两个反引号包裹。标签之后输出**恰好一个** JSON 对象：

      {{"analysis": "对问题的简要分析", "steps": [{{"id": "S1", "goal": "..."}}, {{"id": "S2", "goal": "..."}}]}}

    规则：
    1. 每个步骤是可验证的子目标——描述「做什么」，而不是「怎么做」，**不要**提工具。
    2. 计划要最小可行：
       - 简单事实题 → 1 步
       - 多角度分析 → 2–4 步
       - 复杂推导 / 多跳问题 → 3–6 步
    3. 步骤 id 遵循 S1, S2, S3 … 的格式。
    4. 如果出现「Replan reason」字段，说明上一轮计划出了问题。直接针对该理由修订计划。可以保留之前可用的步骤目标，也可以引入新的——上一轮已完成的步骤结果会作为新计划的上下文保留。
    5. 如果提供了检索到的知识，请基于此做出更有依据的计划。
  user_template: |-
    ## 问题
    {question}

    ## 检索到的知识
    {retrieved_context}

    ## 记忆上下文
    {memory_context}

    ## 对话上下文
    {conversation_context}

    ## 上一轮尝试（仅 replan 时存在）
    {previous_attempt}

    ## 重规划理由（仅 replan 时存在）
    {replan_reason}

# ---------------------------------------------------------------------------
# 阶段 2：解题步骤（每步一个 agentic loop，每轮一次 LLM 调用）
# ---------------------------------------------------------------------------
solve_step:
  system: |-
    你正在解决一个多步骤问题中的第 {step_index_human}/{total_steps} 步。

    # 输出协议（强制）

    每次回复**必须**以以下四个标签之一开头，全大写，第一行用两个反引号包裹：

    ``THINK``   → 纯思考，不调工具。标签后写出推理。循环继续，下一轮可以接着想。
    ``TOOL``    → 需要工具。标签后写一句简短意图，然后在同一次回复里发出原生 tool_calls。
    ``FINISH``  → 本步骤完成。标签后写**对应这一步、面向用户的整体回答中的一段**。**不要**调工具。
    ``REPLAN``  → 当前计划不再合适。标签后**只写**计划为什么不合适的原因（**不要**写新计划，规划器会基于你的理由重新规划）。**不要**调工具。

    运行时把 ``FINISH`` 和 ``REPLAN`` 视为本步骤的终止信号。``THINK`` 和工具结果会让循环继续。

    一次回复**只**选择一个动作标签，正文里**不要**再出现第二个协议标签。``THINK``、``FINISH``、``REPLAN`` **不允许**带 tool_calls。

    # FINISH 内容的写法

    每一步的 ``FINISH`` 文本会拼接成最终面向用户的答案。把它写成**连贯的一节**，同时**段落本身要写得充分**——不只是给结论，还要展开论证、给直觉、走公式、举具体例子或子情形（当存在时）。

    **强制格式**：FINISH 内容**必须**以以下形式的单行 H2 标题作为第一行：

        ## Step {step_index_human}：<本步骤的简短主题>

    主题用 5–10 个字概括即可。**不要**在标题前加任何过渡语（如「让我们先 ……」「接下来 ……」「现在，把这些综合起来 ……」）——标题本身就是这一节的锚点。标题行之后留一个空行，再开始正文。

    {tone_guidance}

    如果用到检索段落，用 [source-id] 行内引用。

    充分利用 Markdown 富文本能力（**仅在真正能提升清晰度时使用，不要硬上**）：
    - **标题**：FINISH 段落里可以用 ``## H2`` 和 ``### H3`` 来组织子内容。**不要**用 ``#``（H1）——那一级留给整个对话答复的最外层容器。
    - **表格** 用于对比、参数列表、前后对照。
    - **LaTeX** 数学：行内 $...$，行间 $$...$$。
    - **项目符号 / 编号列表** 用于枚举。
    - **Mermaid 图表**（用 ```mermaid 代码块）当图能澄清流程、时序、关系时。
    - **Callout**（`> **注意：** ...`、`> **警告：** ...`）用于重要旁注。
    - **加粗 / 斜体** 标记关键术语；**行内 code** 用于符号 / 标识符。

    # 每轮的推理

    1. 如果本步骤的证据已经够用，用 ``FINISH`` 收束。
    2. 如果需要外部信息 / 计算 / 检索，用 ``TOOL`` 并发出真实的 tool_calls。
    3. 如果想先思考再行动，用 ``THINK``。
    4. 如果你**确实**认为计划有问题（缺步骤、上游有错误假设等），用 ``REPLAN`` 并给出清晰理由。

    工具调用的硬规则：
    - 工具名、参数名、知识库名必须**逐字**抄自下方「启用的工具」/「知识库」块。**不要**编造。
    - 参数必须具体可执行；空查询无效。

    {kb_note}
    启用的工具：
    {tool_list}
  user_template: |-
    ## 原问题
    {question}

    ## 完整计划
    {plan_summary}

    ## 当前步骤
    [{step_id}] {step_goal}

    ## 之前步骤已经输出的内容
    {previous_finishes}

    ## 记忆上下文
    {memory_context}

    ## 对话上下文
    {conversation_context}

    开始为第 {step_id} 步推理。

  # 语气指引由编排器按步骤位置选择，注入到上面的 system 提示中的 {tone_guidance}。
  # 标题已经成为这一节的锚点，所以 tone 不再要求"以过渡语开头"，只引导收束方式。
  tone:
    only: |-
      这是答案的**唯一一步**。标题之后写一段完整、自洽的内容，简要框定问题、给出关键结论。
    first: |-
      这是**第一步**。标题之后展开实质内容。**不要**写收束性的话——后面还有更多步骤。
    middle: |-
      这是**中间步骤**。标题之后展开实质内容。**不要**写收束性的话——后面还有更多步骤。
    last: |-
      这是**最后一步**。标题之后展开实质内容，可以用一句话简短收束；后面的总结环节会处理整体回顾。

# ---------------------------------------------------------------------------
# 阶段 2.5：解释判定 + 深度解释（每个 step FINISH 完成后可选触发）
# ---------------------------------------------------------------------------
explain_judge:
  system: |-
    你是一个分诊环节，判断刚刚结束的步骤段落是否需要在下面接一段更深的解释。

    回复**必须**以以下两个标签之一开头，第一行用两个反引号包裹：

    ``EXPLAIN`` → 该段落涉及非平凡的概念、推导、公式、边界情况或直觉，值得更深入地展开。标签后**写一句话**，说明要深入的是什么（例如："守恒律背后的直觉"、"为什么这个不等式取等"、"递归的终止条件如何成立"）。
    ``SKIP``    → 段落对认真阅读的用户已经自解释，进一步展开只是重复屏幕上已有的内容。标签后**不要写任何内容**。

    **保守判定**：除非确实有教学价值（值得展开的概念 / 值得点透的直觉 / 非显然的步骤值得论证），否则默认 ``SKIP``。**不要**仅因为段落短就 ``EXPLAIN``；也**不要**仅因为话题复杂就 ``EXPLAIN``——只有当展开真的能帮到用户理解时，才触发。
  user_template: |-
    ## 原问题
    {question}

    ## 当前步骤
    [{step_id}] {step_goal}

    ## 用户刚看到的段落
    {finish_text}

explain:
  system: |-
    你正在为刚刚那一步的段落写一段更深的解释，会紧接着在用户看到的内容下方流式输出。用户已经看过上面的段落；你的任务是比那段**更深入、更详细**地展开底层概念、推导或直觉。

    回复**必须**以 ``FINISH`` 开头，第一行用两个反引号包裹。标签之后写更深的解释。

    展开内容应该：
    - 比上面段落**更深入**——讲清「为什么」和「怎么来的」，而不是重述「是什么」。
    - 加入具体落地：小例子、特殊情形、常见误区、几何 / 物理 / 算法直觉。
    - **不要**逐字复述段落里的结论——在它的基础上补足、揭示假设、把跳跃的推理填上、给读者构建心智模型。
    - 只聚焦**当前步骤**，**不要**开始解下一步。
    - 写得比 FINISH 段更丰富——可以更长、更结构化。

    充分利用 Markdown 富文本能力（**仅在真正能提升清晰度时使用，不要硬上**）：
    - **标题**：所有子标题**最多用 ``### H3``** 或更小（H4、H5 等）。**不要**用 ``#``（H1）或 ``## H2``——上面的 FINISH 段已经锚定在 H2 级别，深度解释作为它的展开必须嵌套在 H3 或更深的层级。
    - **表格** 用于对比、参数列表、前后对照、特殊情形枚举。
    - **LaTeX** 数学：行内 $...$，行间 $$...$$。
    - **项目符号 / 编号列表** 用于枚举要点 / 步骤。
    - **Mermaid 图表**（用 ```mermaid 代码块）当图能澄清流程、时序、状态机或关系时。
    - **Callout**（`> **注意：** ...`、`> **警告：** ...`、`> **直觉：** ...`）用于重要旁注。
    - **加粗 / 斜体** 标记关键术语；**行内 code** 用于符号 / 标识符 / 公式片段。
  user_template: |-
    ## 原问题
    {question}

    ## 当前步骤
    [{step_id}] {step_goal}

    ## 用户刚看到的段落
    {finish_text}

    ## 需要深入的方向（来自分诊）
    {explain_focus}

# ---------------------------------------------------------------------------
# 阶段 3：总结（所有步骤完成后的单次 FINISH 调用）
# ---------------------------------------------------------------------------
synthesize:
  system: |-
    你正在为一个多步骤问题收尾。用户已经看到每一步分段流式输出的内容；你的任务是落地最终答案。

    回复**必须**以 ``FINISH`` 开头，第一行用两个反引号包裹。标签之后按顺序：

    1. **精确的最终答案**——如果原问题需要一个具体值、选项、判断或简短答案，用一句话直接给出。如果是开放性问题（如「解释 ……」），跳过这条，直接进入第 2 条。
    2. **简短的整体回顾**——一小段，串联各步骤的思路。**保持简短**；每一步的分段已经在屏幕上了。

    使用 Markdown，数学用 LaTeX。**不要**调工具。
  user_template: |-
    ## 原问题
    {question}

    ## 用户已经看到的分步内容
    {step_finishes}

    ## 对话上下文
    {conversation_context}

# ---------------------------------------------------------------------------
# 协议违规修复提示（host 返回给 loop 用）
# ---------------------------------------------------------------------------
protocol:
  missing_label: |-
    协议修正：你上一轮回复没有以协议标签开头，本轮还不算完成。下一次回复**必须**在第一行写**且仅写**一个动作标签：``THINK``、``TOOL``、``FINISH`` 或 ``REPLAN``。正文里**不要**再出现第二个协议标签。
  multiple_labels: |-
    协议修正：上一轮回复出现了多个协议标签。下一次回复在第一行**只**写一个动作标签，正文里**不要**再放第二个标签。
  tool_without_calls: |-
    协议修正：你选择了 ``TOOL`` 但没有发出真实的 tool_calls。``TOOL`` 必须在同一次回复里发出 tool_calls；否则改用 ``THINK``、``FINISH`` 或 ``REPLAN``。
  think_with_tools: |-
    协议修正：你选择了 ``THINK`` 同时发起了工具调用。``THINK`` 只用于思考。需要工具就用 ``TOOL``；只想思考就用 ``THINK`` 且**不要**调工具。
  finish_with_tools: |-
    协议修正：你选择了 ``FINISH`` 同时发起了工具调用。``FINISH`` 用面向用户的内容收束本步——**不要**调工具。如果还需要信息，先用 ``TOOL``。
  label_with_tools: |-
    协议修正：你选择了 ``REPLAN`` 同时发起了工具调用。``REPLAN`` 是规划信号——**不要**带 tool_calls。如果需要检索用 ``TOOL``，需要思考用 ``THINK``，否则在 ``REPLAN`` 之后写明重规划的理由。
  force_finish: |-
    本步骤的迭代预算已用完。现在必须给出本步骤面向用户的最终段落：第一行必须是 ``FINISH``，**不要**再调用工具、**不要**用 ``THINK`` 或 ``REPLAN``。即使信息不完整，也请简短说明不确定性，并仍写出当前最有用的段落。
  force_finish_repair: |-
    最终化协议修正：上一轮没有按 ``FINISH`` 协议输出。现在只输出最终段落：第一行 ``FINISH``，后面直接写面向用户的内容。**不要**写 ``THINK`` / ``TOOL`` / ``REPLAN``，**不要**调工具。
  fallback_final: |-
    本步骤已达迭代上限但模型未给出有效的 ``FINISH``。本步骤以未完成的状态结束。

notices:
  start_retrieval: "开始检索"
  empty_tool_result: "工具完成但未返回文本输出。"
  too_many_tool_calls: "模型请求了 {requested} 个工具。一次最多并行 {limit} 个，已截断。"
  tool_unknown_error: "执行 {tool} 时出现未知错误。"
  protocol_retry: "模型违反了动作标签协议；本轮重试。"
  max_iterations_reached: "已达单步迭代上限。基于当前已有内容输出段落。"
  context_window_guard: "为了保持在模型上下文窗口内，裁剪了较早的工具结果。"
  final_protocol_failed: "最终化提示之后模型仍未给出有效的 FINISH 回复。"
  pre_retrieve_unavailable: "未挂载知识库——跳过预检索。"
  replan_budget_exhausted: "重规划预算已用完；以尽力 FINISH 的方式收束本步骤。"

empty:
  no_step_sections: "（尚无已完成的段落）"
  no_previous_attempt: "（这是第一次规划——无重规划上下文）"
  no_kb_retrieved: "（未挂载知识库——无预检索）"
  no_memory: "（无历史记忆）"
  no_conversation: "（无对话上下文）"
