short_description: "暂停 loop 向用户提 1-5 个澄清问题，所有问题在同一张卡片上展示并可切换；每题可有自己的选项按钮+自由输入。"
when_to_use: "仅在缺少关键信息无法可靠回答时使用：用户水平/年级不明会影响讲解深度、问题指代不清、有多种合理推进路径需要用户选。**不要每轮都问**；用户已经说清楚的场合不要调用。**同一次回复里最多调用一次 `ask_user`**：把所有要澄清的问题打包进同一次调用的 `questions` 列表（最多 3 个），**绝不要**在一个 `tool_calls` 字段里并行发起多个 `ask_user`——重复的卡片是错误，不是冗余。"
input_format: |
  推荐形式：
  {"intro": "可选的一行导语", "questions": [
    {"id": "scope",  "prompt": "问题1正文", "options": ["A","B","C"]},
    {"id": "depth",  "prompt": "问题2正文", "options": ["A","B"]}
  ]}
  每题最多 8 个短选项；用户也可不点而自由输入。一次调用 1-3 个问题；尽量把相关澄清放在同一次调用里，而不是连续多次调用。
  兼容旧形式：{"question": "...", "options": [...]}（系统会自动包装成单元素 questions）。
guideline: "调用后 loop **暂停**等用户回复，然后在**同一轮**自动 resume——你会在下一次迭代看到一条以 `User answered:` 开头的工具结果，下方按 `- <prompt>\\n  → <answer>` 每行一条列出。看到它后，**必须**继续处理用户最初的请求：需要的话再调更多工具，最后用一个有实质内容的 ``FINISH`` 结尾。**绝不**把 ask_user 当作本轮的终点——一句简单的『好的我知道了』不算合格的最终答案。"
note: "用户跳过的问题会以 `(skipped)` 回传。用户也可以点 stop 按钮取消等待（会取消整轮）。"
phase: "exploration"
