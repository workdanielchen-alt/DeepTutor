short_description: "Pause the loop and ask the user 1-3 clarifying questions on one card; each question can have its own option chips and free-form input."
when_to_use: "Only when missing information genuinely blocks a reliable answer: user level / grade is unclear and would change the depth, the question's referent is ambiguous, or several reasonable paths need user input. **Do not call this every turn** and do not call it when the user has already been clear. **At most one `ask_user` per assistant message**: bundle every clarification into the `questions` list of that single call (up to 3 questions); never emit multiple parallel `ask_user` tool_calls in one `tool_calls` field — duplicate cards are a bug, not redundancy."
input_format: |
  Preferred:
  {"intro": "optional one-line lead-in", "questions": [
    {"id": "scope",  "prompt": "Q1 text", "options": ["A","B","C"]},
    {"id": "depth",  "prompt": "Q2 text", "options": ["A","B"]}
  ]}
  Each question allows up to 8 short option chips; the user can also type free-form text. 1-3 questions per call; group related clarifications in one call rather than calling the tool multiple times in a row.
  Legacy shorthand (still accepted, auto-wrapped): {"question": "...", "options": [...]}.
guideline: "After this call the loop **PAUSES** until the user answers, then **RESUMES on the SAME turn**. The user's reply appears as the matching tool result with content beginning ``User answered:`` followed by one ``- <prompt>\\n  → <answer>`` line per question. When you see that, you MUST continue addressing the user's original request — call more tools if needed, then end with a substantive ``FINISH``. **Do NOT** treat ask_user as the end of the turn — a single-line acknowledgment is not an acceptable final answer."
note: "Skipped questions arrive as ``(skipped)``. The user can also cancel the pause via the stop button (cancels the whole turn)."
phase: "exploration"
